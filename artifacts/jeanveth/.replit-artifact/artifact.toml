kind = "web"
previewPath = "/"
title = "jeanv.eth — Corporate Web3"
version = "1.0.0"
id = "artifacts/jeanveth"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25686

[services.development]
run = "pnpm --filter @workspace/jeanveth run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jeanveth", "run", "build" ]
publicDir = "artifacts/jeanveth/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25686"
BASE_PATH = "/"
